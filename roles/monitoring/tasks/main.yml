---
- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/monitoring
    - /opt/monitoring/prometheus
    - /opt/monitoring/grafana/provisioning/datasources

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus/prometheus.yml
    mode: "0644"

- name: Deploy Grafana datasource
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: /opt/monitoring/grafana/provisioning/datasources/prometheus.yml
    mode: "0644"

- name: Check Prometheus network
  ansible.builtin.shell: docker inspect prometheus --format '{{ '{{' }}json .NetworkSettings.Networks{{ '}}' }}' 2>/dev/null || echo '{}'
  register: prom_network
  changed_when: false

- name: Remove Prometheus on wrong network
  ansible.builtin.shell: docker rm -f prometheus
  when: prom_network.stdout != '{}' and '{{ mcp_network_name }}_default' not in prom_network.stdout

- name: Check if Prometheus container exists
  ansible.builtin.shell: docker ps -a --filter name=^prometheus$ --format '{{ '{{' }}.Names{{ '}}' }}'
  register: prom_exists
  changed_when: false

- name: Start Prometheus container
  ansible.builtin.shell: >
    docker run -d
    --name prometheus
    --restart unless-stopped
    --network {{ mcp_network_name }}_default
    -p {{ prometheus_port }}:9090
    -v /opt/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    prom/prometheus:{{ prometheus_version }}
  when: prom_exists.stdout == ""

- name: Check Grafana network
  ansible.builtin.shell: docker inspect grafana --format '{{ '{{' }}json .NetworkSettings.Networks{{ '}}' }}' 2>/dev/null || echo '{}'
  register: grafana_network
  changed_when: false

- name: Remove Grafana on wrong network
  ansible.builtin.shell: docker rm -f grafana
  when: grafana_network.stdout != '{}' and '{{ mcp_network_name }}_default' not in grafana_network.stdout

- name: Check if Grafana container exists
  ansible.builtin.shell: docker ps -a --filter name=^grafana$ --format '{{ '{{' }}.Names{{ '}}' }}'
  register: grafana_exists
  changed_when: false

- name: Start Grafana container
  ansible.builtin.shell: >
    docker run -d
    --name grafana
    --restart unless-stopped
    --network {{ mcp_network_name }}_default
    -p {{ grafana_port }}:3000
    -e GF_SECURITY_ADMIN_PASSWORD={{ grafana_password }}
    -v /opt/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    grafana/grafana:{{ grafana_version }}
  when: grafana_exists.stdout == ""

- name: Wait for Prometheus
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}/-/healthy"
    status_code: 200
  register: prom_health
  until: prom_health.status == 200
  retries: 6
  delay: 5
  ignore_errors: yes

- name: Wait for Grafana
  ansible.builtin.uri:
    url: "http://localhost:{{ grafana_port }}/api/health"
    status_code: 200
  register: grafana_health
  until: grafana_health.status == 200
  retries: 6
  delay: 5
  ignore_errors: yes

- name: Display monitoring status
  ansible.builtin.debug:
    msg:
      - "Prometheus: {{ 'healthy' if (prom_health.status | default(0)) == 200 else 'starting...' }}"
      - "Grafana: {{ 'healthy' if (grafana_health.status | default(0)) == 200 else 'starting...' }}"
