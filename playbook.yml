---
- name: Deploy Memory Stack (HeurChain + Second-Brain MCP) on CT 203
  hosts: ct203
  gather_facts: true
  become: yes

  pre_tasks:
    - name: Verify target is accessible
      ansible.builtin.ping:

    - name: Display target info
      ansible.builtin.debug:
        msg: "Deploying to {{ ansible_hostname }} ({{ ct_ip }})"

  roles:
    - role: system-prereqs
      tags: [system, prereqs]

    - role: obsidian-vault
      tags: [system, obsidian]

    - role: system-redis
      tags: [docker, system-redis]

    - role: heurchain
      tags: [heurchain, system]

    - role: docker-stack
      tags: docker

    - role: monitoring
      tags: monitoring

  post_tasks:
    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Memory Stack Deployment Complete!"
          - "=========================================="
          - "HeurChain:   http://{{ ct_ip }}:{{ heurchain_port }}"
          - "MCP Server:  http://{{ ct_ip }}:{{ mcp_port }}"
          - "Nginx GW:    http://{{ ct_ip }}:{{ nginx_port }}"
          - "System Redis: redis://{{ ct_ip }}:6379 (shared)"
          - "Obsidian vault: {{ obsidian_vault_path }}"
          - "Prometheus:  http://{{ ct_ip }}:{{ prometheus_port }}"
          - "Grafana:     http://{{ ct_ip }}:{{ grafana_port }} (admin/{{ grafana_password }})"
          - "=========================================="
